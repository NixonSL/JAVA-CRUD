spring.application.name=projeto
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:projeto_db}
spring.datasource.username=${DB_USER:projeto_user}
spring.datasource.password=${DB_PASSWORD:projeto123}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# ===== CONFIGURAúíES DE SEGURANúA =====
# JWT - Secret key (mÚnimo 32 caracteres para HS256)
jwt.secret=${JWT_SECRET:minhaChaveSecretaSuperSeguraCom32CaracteresOuMais}

# JWT - ExpiraÓÐo em milissegundos (1 hora = 3600000)
jwt.expiration=${JWT_EXPIRATION:3600000}

# JWT - Refresh token expiraÓÐo (7 dias = 604800000)
jwt.refresh-expiration=${JWT_REFRESH_EXPIRATION:604800000}

# BCrypt - ForÓa do hash (padrÐo Spring Security = 10)
security.bcrypt.strength=${BCRYPT_STRENGTH:10}
