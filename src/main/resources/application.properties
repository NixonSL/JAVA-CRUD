spring.application.name=projeto
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:projeto_db}
spring.datasource.username=${DB_USER:projeto_user}
spring.datasource.password=${DB_PASSWORD:projeto123}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# JWT Configurations
jwt.secret=${JWT_SECRET:minhaChaveSecretaSuperSeguraCom32CaracteresOuMais}
jwt.expiration=${JWT_EXPIRATION:3600000}
jwt.refresh-expiration=${JWT_REFRESH_EXPIRATION:604800000}

# BCrypt strength
security.bcrypt.strength=${BCRYPT_STRENGTH:10}